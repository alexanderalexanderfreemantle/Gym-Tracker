<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: 'Inter', sans-serif;
background:#f4f4f4;
margin:0;
padding:15px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:15px;
border-radius:8px;
}
.top-bar{
display:flex;
gap:14px;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}
.app-title{
font-size:34px;
font-weight:700;
letter-spacing:-1px;
margin-bottom:25px;
color:#111827;
}
#weekSelect{
padding:14px 18px;
font-size:20px;
font-weight:600;
border-radius:10px;
border:1px solid #dcdcdc;
background:white;
font-family:'Inter', sans-serif;
min-width:180px;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.new-week-btn{
padding:14px 20px;
font-size:16px;
font-weight:600;
border:none;
border-radius:10px;
background:#111827;
color:white;
cursor:pointer;
transition:0.2s;
font-family:'Inter', sans-serif;
}

.new-week-btn:hover{
opacity:0.9;
transform:translateY(-1px);
}
.day-header{
background:#eee;
padding:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
border-radius:6px;
}

.day-content{
display:none;
padding:10px;
}

.exercise{
margin-bottom:20px;
padding-bottom:10px;
border-bottom:1px solid #ddd;
}

.set-row{
display:flex;
gap:10px;
margin-top:5px;
align-items:center;
flex-wrap:wrap;
}

input{
padding:6px;
width:70px;
}

button{
padding:10px;
margin-bottom:15px;
}

.save-btn{
position:fixed;
bottom:20px;
right:20px;
padding:15px;
background:green;
color:white;
border:none;
border-radius:50%;
font-size:20px;
}

.graph-section{
margin-top:40px;
}

#chart{
width:100% !important;
height:80vh !important;
}

.suggestion{
font-size:12px;
margin-top:5px;
}

.up{
color:green;
}

.down{
color:red;
}

@media(max-width:600px){

#chart{
height:85vh !important;
}

.set-row{
flex-direction:row;
}

}
.dashboard-section{
margin-top:40px;
border:2px solid #ddd;
border-radius:12px;
overflow:hidden;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.dashboard-header{
padding:16px;
font-size:20px;
font-weight:600;
background:#f5f5f5;
cursor:pointer;
user-select:none;
}

.dashboard-content{
display:none;
padding:20px;
}

.exercise-table-container{
overflow-x:auto;
margin-bottom:25px;
}

.exercise-table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.exercise-table th{
text-align:left;
padding:12px;
background:#f0f0f0;
}

.exercise-table td{
padding:10px;
border-bottom:1px solid #eee;
}

.exercise-table input[type="checkbox"]{
transform:scale(1.2);
cursor:pointer;
}

.color-pill{
width:18px;
height:18px;
border-radius:999px;
display:inline-block;
}

.graph-wrapper{
height:70vh;
position:relative;
}

#chart{
width:100% !important;
height:100% !important;
}
</style>
</head>

<body>

<h1 class="app-title">Gym Tracker</h1>

<div class="container">

<div class="top-bar">

<select id="weekSelect"></select>

<button class="new-week-btn" onclick="newWeek()">
+ New Week
</button>

</div>



<div id="days"></div>

<div class="dashboard-section">

<div class="dashboard-header" onclick="toggleDashboard()">
📊 Dashboard
</div>

<div class="dashboard-content" id="dashboardContent">

<div class="exercise-table-container">

<table class="exercise-table">

<thead>
<tr>
<th>Track</th>
<th>Exercise</th>
<th>Colour</th>
</tr>
</thead>

<tbody id="toggles"></tbody>

</table>

</div>

<div class="graph-wrapper">
<canvas id="chart"></canvas>
</div>

</div>

</div>

</div>

<button class="save-btn" onclick="save()">💾</button>

<script>

const STORAGE_KEY="gymTracker_v6";

let data={};
let chart;

const workouts={

"Monday – Push": [
'Incline Dumbbell Press',
'Shoulder Press',
'Seated Row',
'Cable Lateral Raise',
'Tricep Pushdown',
'Pec Fly'
],

"Wednesday – Lower": [
'Hack Squat',
'Romanian Deadlift',
'Hamstring Curl',
'Leg Extension',
'Calf Raises'
],

"Thursday – Full Body": [
'Bench Press',
'Face pulls',
'Lat Pulldown',
'Machine Crunches',
'Rear Delt Fly',
'Preacher Curl'
],

"Friday – Arms": [
'Cable Curl',
'Hammer Curl',
'Overhead Tricep Extension',
'Tricep Pushdown',
'Farmers Carry',
'Machine Crunches'
],

"Sunday – Pump": [
'Incline Smith Press',
'Assisted Pull-ups',
'Dumbbell Lateral Raises',
'Cuban lift',
'Close hand lat pulldown',
'Leg Press'
]

};

const progressionRules = {

'Incline Dumbbell Press': {min:6,max:8,jump:2},
'Shoulder Press': {min:6,max:8,jump:2},
'Seated Row': {min:8,max:10,jump:5},

'Cable Lateral Raise': {min:8,max:12,jump:2.5},
'Tricep Pushdown': {min:10,max:12,jump:2.5},
'Pec Fly': {min:8,max:12,jump:5},

'Hack Squat': {min:6,max:8,jump:5},
'Romanian Deadlift': {min:6,max:8,jump:5},

'Hamstring Curl': {min:8,max:12,jump:5},
'Leg Extension': {min:8,max:12,jump:5},
'Calf Raises': {min:12,max:15,jump:10},

'Bench Press': {min:6,max:8,jump:2.5},
'Face pulls': {min:12,max:15,jump:2.5},
'Lat Pulldown': {min:7,max:10,jump:5},

'Machine Crunches': {min:10,max:12,jump:5},
'Rear Delt Fly': {min:8,max:12,jump:2.5},

'Preacher Curl': {min:6,max:8,jump:2.5},
'Cable Curl': {min:8,max:12,jump:2.5},
'Hammer Curl': {min:8,max:12,jump:2},

'Overhead Tricep Extension': {min:8,max:12,jump:2.5},

'Farmers Carry': {min:4,max:6,jump:4},

'Incline Smith Press': {min:6,max:8,jump:5},
'Assisted Pull-ups': {min:6,max:8,jump:5},

'Dumbbell Lateral Raises': {min:8,max:10,jump:4},
'Cuban lift': {min:8,max:10,jump:5},

'Close hand lat pulldown': {min:8,max:10,jump:5},
'Leg Press': {min:10,max:15,jump:10}

};

const allExercises=[...new Set(Object.values(workouts).flat())];
const exerciseGroups = {

Chest: [
'Incline Dumbbell Press',
'Pec Fly',
'Bench Press',
'Incline Smith Press'
],

Legs: [
'Hack Squat',
'Romanian Deadlift',
'Hamstring Curl',
'Leg Extension',
'Calf Raises',
'Leg Press'
],

Shoulders: [
'Shoulder Press',
'Cable Lateral Raise',
'Rear Delt Fly',
'Face pulls',
'Cuban lift',
'Dumbbell Lateral Raises'
],

Back: [
'Seated Row',
'Lat Pulldown',
'Assisted Pull-ups',
'Close hand lat pulldown'
],

Biceps: [
'Hammer Curl',
'Cable Curl',
'Preacher Curl'
],

Triceps: [
'Tricep Pushdown',
'Overhead Tricep Extension'
],

Other: [
'Machine Crunches',
'Farmers Carry'
]

};
function toggleDashboard(){
  const dashboard = document.getElementById("dashboardContent");
  dashboard.style.display = dashboard.style.display === "block" ? "none" : "block";
}


function template(){

let t={};

for(let d in workouts){

t[d]={};

workouts[d].forEach(ex=>{

t[d][ex]={

sets:[
{weight:"",reps:""},
{weight:"",reps:""},
{weight:"",reps:""}
]

};

});

}

return t;

}

function load(){

const stored=localStorage.getItem(STORAGE_KEY);

if(stored){

data=JSON.parse(stored);

}else{

newWeek();

}

}

function save(){

updateData();

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

renderChart();

renderDays();

alert("Saved");

}

function newWeek(){

const w="Week "+(Object.keys(data).length+1);

data[w]=template();

renderWeeks();

selectWeek(w);

}

function duplicateWeek(){

const weeks=Object.keys(data);

if(!weeks.length) return;

const last=weeks[weeks.length-1];

const w="Week "+(weeks.length+1);

data[w]=JSON.parse(JSON.stringify(data[last]));

renderWeeks();

selectWeek(w);

}

function renderWeeks(){

const s=document.getElementById("weekSelect");

s.innerHTML="";

Object.keys(data).forEach(w=>{

let o=document.createElement("option");

o.value=w;
o.textContent=w;

s.appendChild(o);

});

}

function selectWeek(w){

document.getElementById("weekSelect").value=w;

renderDays();

renderChart();

}

function getWeek(){

return document.getElementById("weekSelect").value;

}
function getPreviousWeekData(currentWeek, day, ex){

const weeks = Object.keys(data);
const idx = weeks.indexOf(currentWeek);

if(idx <= 0) return null;

const prevWeek = weeks[idx - 1];

if(
data[prevWeek] &&
data[prevWeek][day] &&
data[prevWeek][day][ex]
){
return data[prevWeek][day][ex];
}

return null;

}
function renderDays(){

const week=getWeek();

const c=document.getElementById("days");

c.innerHTML="";

for(let d in workouts){

let div=document.createElement("div");

div.innerHTML=`

<div class="day-header">${d}</div>

<div class="day-content">

${workouts[d].map(ex=>{

let e=data[week][d][ex];

let suggestion=getSuggestion(week,d,ex);
let previousData=getPreviousWeekData(week,d,ex);
return `

<div class="exercise" data-day="${d}" data-ex="${ex}">

<b>${ex}</b>

${e.sets.map((set,i)=>`

<div class="set-row">

<label>S${i+1}</label>

<input 
class="set-weight" 
type="number" 
step="0.5"
value="${set.weight}"
placeholder="kg"
>

<input 
class="set-reps" 
type="number"
value="${set.reps}"
placeholder="reps"
>

${
previousData && previousData.sets[i]
? `<span style="font-size:12px;color:#666;">
Last: ${previousData.sets[i].weight || "-"}kg × ${previousData.sets[i].reps || "-"}
</span>`
: ""
}

</div>

`).join("")}

<div class="suggestion">${suggestion}</div>

</div>

`;

}).join("")}

</div>

`;

div.querySelector(".day-header").onclick=()=>{

let c=div.querySelector(".day-content");

c.style.display=c.style.display==="block" ? "none" : "block";

};

c.appendChild(div);

}

setupWeightAutofill();

}

function setupWeightAutofill(){

document.querySelectorAll(".exercise").forEach(exercise=>{

const weightInputs=exercise.querySelectorAll(".set-weight");

if(weightInputs.length===0) return;

weightInputs[0].addEventListener("blur",()=>{

const firstValue=weightInputs[0].value;

for(let i=1;i<weightInputs.length;i++){

if(weightInputs[i].value===""){

weightInputs[i].value=firstValue;

}

}

});

});

}

function updateData(){

const w=getWeek();

document.querySelectorAll(".exercise").forEach(el=>{

const d=el.dataset.day;
const ex=el.dataset.ex;

const weights=[...el.querySelectorAll(".set-weight")];
const reps=[...el.querySelectorAll(".set-reps")];

const sets=weights.map((wInput,i)=>({

weight:parseFloat(wInput.value)||"",
reps:parseInt(reps[i].value)||""

}));

data[w][d][ex]={sets};

});

}

function bestSetVolume(e){

return Math.max(...e.sets.map(s=>(s.weight||0)*(s.reps||0)));

}

function renderToggles(){

const t=document.getElementById("toggles");

t.innerHTML="";

let colorIndex = 0;

for(const group in exerciseGroups){

const groupRow=document.createElement("tr");

groupRow.innerHTML=`

<td colspan="3"
style="
font-weight:700;
padding-top:20px;
background:#f7f7f7;
">

<label style="display:flex;align-items:center;gap:10px;">

<input
type="checkbox"
class="group-toggle"
data-group="${group}"
>

${group}

</label>

</td>

`;

t.appendChild(groupRow);

exerciseGroups[group].forEach(ex=>{

const color=getColor(colorIndex);

let row=document.createElement("tr");

row.innerHTML=`

<td>
<input
type="checkbox"
value="${ex}"
class="exercise-toggle"
>
</td>

<td style="padding-left:25px;">
${ex}
</td>

<td>
<span class="color-pill"
style="background:${color}">
</span>
</td>

`;

t.appendChild(row);

colorIndex++;

});

}

setupToggleLogic();

}
function setupToggleLogic(){

// GROUP TOGGLE
document.querySelectorAll(".group-toggle").forEach(groupBox=>{

groupBox.addEventListener("change",()=>{

const group = groupBox.dataset.group;

const exercises = exerciseGroups[group];

document.querySelectorAll(".exercise-toggle").forEach(exBox=>{

if(exercises.includes(exBox.value)){

exBox.checked = groupBox.checked;

}

});

renderChart();

});

});

// INDIVIDUAL EXERCISE TOGGLE
document.querySelectorAll(".exercise-toggle").forEach(exBox=>{

exBox.addEventListener("change",()=>{

renderChart();

});

});

}
function getColor(index){

const colors=[
"#ff6384",
"#36a2eb",
"#4bc0c0",
"#ff9f40",
"#9966ff",
"#c9cbcf",
"#00c853",
"#ff5252",
"#ffd600",
"#7c4dff",
"#00b8d4",
"#ff6d00"
];

return colors[index % colors.length];

}
function renderChart(){

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

const checked=[...document.querySelectorAll(".exercise-toggle:checked")]
.map(i=>i.value);

const weeks=Object.keys(data);

// STORE TOOLTIP INFO
const tooltipData = {};

const datasets=checked.map((ex,index)=>{

tooltipData[ex] = [];

const values = weeks.map(w=>{

for(let d in data[w]){

if(data[w][d][ex]){

const exData = data[w][d][ex];

const volume = bestSetVolume(exData);

// NO DATA
if(volume <= 0){

tooltipData[ex].push(null);

return null;

}

const bestSet = exData.sets.reduce((best,current)=>{

const bestVol =
(Number(best.weight)||0) *
(Number(best.reps)||0);

const currentVol =
(Number(current.weight)||0) *
(Number(current.reps)||0);

return currentVol > bestVol ? current : best;

});

// SAVE TOOLTIP INFO
tooltipData[ex].push({
weight:bestSet.weight,
reps:bestSet.reps
});

return volume;

}

}

tooltipData[ex].push(null);

return null;

});

return {

label:ex,

data:values,

borderColor:getColor(index),
backgroundColor:getColor(index),

borderWidth:3,
spanGaps:true,
tension:0.3,

pointRadius:5,
pointHoverRadius:7

};

});

chart=new Chart(ctx,{

type:"line",

data:{
labels:weeks,
datasets
},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{

tooltip:{

callbacks:{

label:function(context){

const exercise = context.dataset.label;

const info =
tooltipData[exercise][context.dataIndex];

if(!info) return "";

return `${exercise}: ${info.weight}kg × ${info.reps}`;

}

}

}

}

}

});

}

function getSuggestion(week,day,ex){

const rules=progressionRules[ex];

if(!rules) return "";

const weeks=Object.keys(data);

const idx=weeks.indexOf(week);

const curr=data[week][day][ex];

if(!curr) return "";

// CHECK IF CURRENT WEEK HAS ANY WEIGHT ENTERED
const currentWeekStarted =
curr.sets.some(s => Number(s.weight) > 0);

// FIRST WEEK = NO MESSAGE
if(idx <= 0){

return "";

}

const prevWeek=weeks[idx-1];

const prevData=data[prevWeek][day][ex];

if(!prevData) return "";

// PREVIOUS WEEK VALUES
const prevReps=prevData.sets.map(s=>Number(s.reps)||0);
const prevWeights=prevData.sets.map(s=>Number(s.weight)||0);

const prevAllAtTop=
prevReps.every(r=>r>=rules.max);

const prevAvgWeight=
prevWeights.reduce((a,b)=>a+b,0)/prevWeights.length;

const prevSuggestedWeight=
Math.round((prevAvgWeight+rules.jump)*100)/100;

// ===== NEW FEATURE =====
// SHOW "INCREASE TO X THIS WEEK"
// ONLY if previous week earned progression
// AND current week has not started
if(prevAllAtTop && !currentWeekStarted){

return `
<span class='up'>
Start this week at ${prevSuggestedWeight}kg
</span>
`;

}

// ===== NORMAL CURRENT WEEK LOGIC =====

const reps=curr.sets.map(s=>Number(s.reps)||0);
const weights=curr.sets.map(s=>Number(s.weight)||0);

// NO DATA ENTERED = NO MESSAGE
const noData =
weights.every(w=>w===0) &&
reps.every(r=>r===0);

if(noData){

return "";

}

const allAtTop=
reps.every(r=>r>=rules.max);

const avgWeight=
weights.reduce((a,b)=>a+b,0)/weights.length;

const suggestedWeight=
Math.round((avgWeight+rules.jump)*100)/100;

const lowPerformance=
reps.filter(r=>r<rules.min).length>=2;

// INCREASE NEXT WEEK
if(allAtTop){

return `
<span class='up'>
↑ Increase to ${suggestedWeight}kg next week
</span>
`;

}

// LOW PERFORMANCE
if(lowPerformance){

return `
<span class='down'>
Performance low → reduce fatigue or deload
</span>
`;

}

// STAY AT SAME WEIGHT
return `
Stay at current weight and aim for ${rules.max} reps
`;

}

document.getElementById("weekSelect").onchange=renderDays;

load();

renderWeeks();

renderToggles();

selectWeek(Object.keys(data)[Object.keys(data).length-1]);

</script>

</body>
</html>
