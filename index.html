<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; background:#f4f4f4; margin:0; padding:15px;}
.container {max-width:900px; margin:auto; background:white; padding:15px; border-radius:8px;}
.day-header {background:#eee; padding:10px; cursor:pointer; font-weight:bold;}
.day-content {display:none; padding:10px;}
.exercise {margin-bottom:15px;}
input {padding:6px; width:60px;}
.save-btn {position:fixed; bottom:20px; right:20px; padding:15px; background:green; color:white; border:none; border-radius:50%;}
.suggestion {font-size:12px;}
.up {color:green;}
.down {color:red;}
</style>
</head>

<body>

<h2>Gym Tracker</h2>

<div class="container">

<select id="weekSelect"></select>
<button onclick="newWeek()">New Week</button>
<button onclick="duplicateWeek()">Duplicate</button>

<br><br>

<button onclick="scrollToGraph()">📊 View Progress</button>

<br><br>

<div id="days"></div>

<div class="graph-section">
  <h3>Progress Graph</h3>
  <div id="toggles"></div>
  <canvas id="chart"></canvas>
</div>

</div>

<button class="save-btn" onclick="save()">💾</button>

<script>
const STORAGE_KEY="gymTracker_v4";
let data={};
let chart;

// FULL SPLIT (YOUR EXACT ONE)
const workouts={
"Monday – Push": ['Incline Dumbbell Press','Shoulder Press','Seated Row','Cable Lateral Raise','Tricep Pushdown','Pec Fly'],
"Wednesday – Lower": ['Hack Squat','Romanian Deadlift','Hamstring Curl','Leg Extension','Calf Raises'],
"Thursday – Full Body": ['Bench Press','Face pulls','Lat Pulldown','Machine Crunches','Rear Delt Fly','Preacher Curl'],
"Friday – Arms": ['Cable Curl','Hammer Curl','Overhead Tricep Extension','Tricep Pushdown','Farmers Carry','Machine Crunches'],
"Sunday – Pump": ['Incline Smith Press','Assisted Pull-ups','Dumbbell Lateral Raises','Cuban lift','Close hand lat pulldown','Leg Press']
};

// ALL exercises for graph
const allExercises=[...new Set(Object.values(workouts).flat())];

// LOAD
function load(){
 const stored=localStorage.getItem(STORAGE_KEY);
 if(stored){data=JSON.parse(stored);}
 else{newWeek();}
}

function scrollToGraph() {
  document.querySelector('.graph-section').scrollIntoView({
    behavior: 'smooth'
  });
}

// SAVE
function save(){
 updateData();
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
 renderChart();
 renderDays();
 alert("Saved");
}

// TEMPLATE
function template(){
 let t={};
 for(let d in workouts){
   t[d]={};
   workouts[d].forEach(ex=>{
     t[d][ex]={weight:0,sets:[0,0,0]};
   });
 }
 return t;
}

// NEW WEEK
function newWeek(){
 const w="Week "+(Object.keys(data).length+1);
 data[w]=template();
 renderWeeks();
 selectWeek(w);
}

// DUPLICATE
function duplicateWeek(){
 const weeks=Object.keys(data);
 if(!weeks.length) return;
 const last=weeks[weeks.length-1];
 const w="Week "+(weeks.length+1);
 data[w]=JSON.parse(JSON.stringify(data[last]));
 renderWeeks();
 selectWeek(w);
}

// UI
function renderWeeks(){
 const s=document.getElementById("weekSelect");
 s.innerHTML="";
 Object.keys(data).forEach(w=>{
   let o=document.createElement("option");
   o.value=w; o.textContent=w;
   s.appendChild(o);
 });
}

function selectWeek(w){
 document.getElementById("weekSelect").value=w;
 renderDays();
 renderChart();
}

function getWeek(){
 return document.getElementById("weekSelect").value;
}

// RENDER DAYS
function renderDays(){
 const week=getWeek();
 const c=document.getElementById("days");
 c.innerHTML="";

 for(let d in workouts){
   let div=document.createElement("div");

   div.innerHTML=`
   <div class="day-header">${d}</div>
   <div class="day-content">
   ${workouts[d].map(ex=>{
     let e=data[week][d][ex];
     let suggestion=getSuggestion(week,d,ex);

     return `
     <div class="exercise" data-day="${d}" data-ex="${ex}">
       <b>${ex}</b><br>
       W <input class="w" type="number" value="${e.weight}">
       ${e.sets.map((s,i)=>`S${i+1} <input class="r" type="number" value="${s}">`).join("")}
       <div class="suggestion">${suggestion}</div>
     </div>`;
   }).join("")}
   </div>`;

   div.querySelector(".day-header").onclick=()=>{
     let c=div.querySelector(".day-content");
     c.style.display=c.style.display==="block"?"none":"block";
   };

   c.appendChild(div);
 }
}

// UPDATE DATA
function updateData(){
 const w=getWeek();
 document.querySelectorAll(".exercise").forEach(el=>{
   const d=el.dataset.day;
   const ex=el.dataset.ex;
   const weight=parseFloat(el.querySelector(".w").value)||0;
   const sets=[...el.querySelectorAll(".r")].map(i=>parseInt(i.value)||0);
   data[w][d][ex]={weight,sets};
 });
}

// VOLUME
function volume(e){
 return Math.max(...e.sets.map(r=>r*e.weight));
}

// TOGGLES
function renderToggles(){
 const t=document.getElementById("toggles");
 t.innerHTML="";
 allExercises.forEach(ex=>{
   let label=document.createElement("label");
   label.innerHTML=`<input type="checkbox" value="${ex}" checked> ${ex}`;
   t.appendChild(label);
 });
 t.onchange=renderChart;
}

// GRAPH
function renderChart(){
 const ctx=document.getElementById("chart");
 if(chart) chart.destroy();

 const checked=[...document.querySelectorAll("#toggles input:checked")].map(i=>i.value);
 const weeks=Object.keys(data);

 const datasets=checked.map(ex=>{
   return {
     label:ex,
     data:weeks.map(w=>{
       for(let d in data[w]){
         if(data[w][d][ex]) return volume(data[w][d][ex]);
       }
       return 0;
     }),
     borderWidth:2
   };
 });

 chart=new Chart(ctx,{
   type:"line",
   data:{labels:weeks,datasets},
   options:{responsive:true}
 });
}

// PROGRESSION SUGGESTIONS
function getSuggestion(week,day,ex){
 const weeks=Object.keys(data);
 const idx=weeks.indexOf(week);
 if(idx<=0) return "";

 const prev=weeks[idx-1];
 const curr=data[week][day][ex];
 const prevD=data[prev][day][ex];

 if(!curr||!prevD) return "";

 const currVol=volume(curr);
 const prevVol=volume(prevD);

 if(currVol>prevVol){
   return "<span class='up'>↑ progressing</span>";
 }

 let plateau=true;
 for(let i=Math.max(0,idx-2); i<idx; i++){
   let v=volume(data[weeks[i]][day][ex]);
   if(v>currVol){plateau=false;}
 }

 if(plateau){
   return "<span class='down'>Plateau → increase weight or deload</span>";
 }

 return "";
}

// INIT
document.getElementById("weekSelect").onchange=renderDays;

load();
renderWeeks();
renderToggles();
selectWeek(Object.keys(data)[Object.keys(data).length-1]);

</script>

</body>
</html>
